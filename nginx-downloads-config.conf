# Add this configuration inside your existing server block
# (after the /eight/ location block)

# Serve download files with proper headers
location /eight/downloads/ {
    alias /path/to/xow/backend/static/downloads/;
    autoindex off;
    
    # Force download instead of displaying in browser
    add_header Content-Disposition 'attachment';
    add_header X-Content-Type-Options nosniff;
    
    # CORS headers (if needed for cross-origin downloads)
    add_header Access-Control-Allow-Origin '*';
    add_header Access-Control-Allow-Methods 'GET, OPTIONS';
    
    # Cache for 7 days (optional - good for large files)
    expires 7d;
    add_header Cache-Control "public, immutable";
    
    # Handle large file downloads
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
}

# IMPORTANT: Replace /path/to/xow/ with your actual server path
# Example: /home/ubuntu/xow/backend/static/downloads/
# or: /var/www/xow/backend/static/downloads/
