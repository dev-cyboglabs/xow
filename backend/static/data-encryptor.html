/* ── crypto ─────────────────────────────────────────── */
function b2h(b){return Array.from(b).map(x=>x.toString(16).padStart(2,'0')).join('')}
function h2b(h){
  const c=h.replace(/\s/g,'');
  if(c.length!==64)throw new Error('Key must be exactly 64 hex characters (256 bits)');
  return new Uint8Array(c.match(/.{2}/g).map(x=>parseInt(x,16)));
}
async function genKey(){return b2h(crypto.getRandomValues(new Uint8Array(32)))}
async function encryptBuf(buf,hexKey){
  const kb=h2b(hexKey);
  const ck=await crypto.subtle.importKey('raw',kb,{name:'AES-GCM'},false,['encrypt']);
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const enc=await crypto.subtle.encrypt({name:'AES-GCM',iv},ck,buf);
  const out=new Uint8Array(4+12+enc.byteLength);
  out.set(MAGIC,0);out.set(iv,4);out.set(new Uint8Array(enc),16);
  return out;
}

/* ── file ────────────────────────────────────────────── */
function readBuf(f){return new Promise((r,j)=>{const x=new FileReader();x.onload=e=>r(e.target.result);x.onerror=j;x.readAsArrayBuffer(f)})}
function fmtSz(b){if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(1)+' KB';return(b/1048576).toFixed(1)+' MB'}

function parseCSV(buf){
  const txt=new TextDecoder().decode(buf);
  const lines=txt.split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length)return{headers:[],rows:[],total:0};
  function pl(l){const r=[];let cur='',q=false;for(const c of l){if(c==='"'){q=!q}else if(c===','&&!q){r.push(cur.trim());cur=''}else cur+=c}r.push(cur.trim());return r}
  return{headers:pl(lines[0]),rows:lines.slice(1,6).map(pl),total:lines.length-1};
}
function parseXLS(buf){
  const wb=XLSX.read(buf,{type:'array'});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const d=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
  const h=(d[0]||[]).map(String);
  return{headers:h,rows:d.slice(1,6).map(r=>h.map((_,i)=>String(r[i]??''))),total:Math.max(0,d.length-1)};
}

/* ── LoginPage ────────────────────────────────────────── */
function LoginPage({onLogin}){
  const [id,setId]=useState('');
  const [pw,setPw]=useState('');
  const [showPw,setShowPw]=useState(false);
  const [err,setErr]=useState('');
  const [busy,setBusy]=useState(false);

  async function submit(e){
    e.preventDefault();setBusy(true);setErr('');
    await new Promise(r=>setTimeout(r,650));
    if(id.trim()===ADMIN_ID&&pw===ADMIN_PASS){
      sessionStorage.setItem('xow_enc','1');onLogin();
    }else{setErr('Invalid ID or password.');}
    setBusy(false);
  }

  return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:20,background:'var(--bg)'}}>
      <div style={{width:'100%',maxWidth:380}} className="fu">
        <div style={{textAlign:'center',marginBottom:32}}>
          <div style={{display:'flex',justifyContent:'center',marginBottom:12}}><Logo h={38}/></div>
          <p style={{fontSize:13,color:'var(--mu)'}}>Data Encryptor — Secure Access</p>
        </div>
        <div className="card" style={{padding:28}}>
          <h2 style={{fontSize:17,fontWeight:600,marginBottom:22}}>Sign In</h2>
          {err&&<div style={{background:'rgba(229,75,42,.1)',border:'1px solid rgba(229,75,42,.3)',borderRadius:8,padding:'10px 14px',marginBottom:16,display:'flex',alignItems:'center',gap:8,fontSize:13,color:'#ff6b4a'}}><I.X/>{err}</div>}
          <form onSubmit={submit}>
            <div style={{marginBottom:16}}>
              <label style={{display:'block',fontSize:11,fontWeight:600,color:'var(--mu)',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.6px'}}>ID</label>
              <input className="inp" type="text" value={id} onChange={e=>setId(e.target.value)} placeholder="Enter your ID" required autoFocus/>
            </div>
            <div style={{marginBottom:24,position:'relative'}}>
              <label style={{display:'block',fontSize:11,fontWeight:600,color:'var(--mu)',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.6px'}}>Password</label>
              <div style={{position:'relative'}}>
                <input className="inp" type={showPw?'text':'password'} value={pw} onChange={e=>setPw(e.target.value)} placeholder="Enter password" required style={{paddingRight:40}}/>
                <button type="button" onClick={()=>setShowPw(v=>!v)} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'var(--mu)',cursor:'pointer',padding:4}}><I.Eye off={showPw}/></button>
              </div>
            </div>
            <button type="submit" disabled={busy} className="btn-p" style={{width:'100%'}}>
              {busy?<><svg className="spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>Verifying...</>:<><I.Lock/>Sign In</>}
            </button>
          </form>
        </div>
        <p style={{textAlign:'center',marginTop:18,fontSize:12,color:'var(--mu)',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}><I.Shield/>All encryption runs locally in your browser</p>
      </div>
    </div>
  );
}

/* ── DropZone ─────────────────────────────────────────── */
function DropZone({onFile,disabled}){
  const [drag,setDrag]=useState(false);
  const ref=useRef(null);

  function validate(f){
    const ext='.'+f.name.split('.').pop().toLowerCase();
    if(!['.csv','.xlsx','.xls'].includes(ext)){alert(`Unsupported file: ${ext}\nAccepted: .csv .xlsx .xls`);return;}
    if(f.size>MAX_SIZE){alert(`File too large (${fmtSz(f.size)})\nMax: 10 MB`);return;}
    onFile(f);
  }

  return(
    <div className={`dz${drag?' on':''}`}
      onDragOver={e=>{e.preventDefault();if(!disabled)setDrag(true)}}
      onDragLeave={()=>setDrag(false)}
      onDrop={e=>{e.preventDefault();setDrag(false);if(!disabled&&e.dataTransfer.files[0])validate(e.dataTransfer.files[0])}}
      onClick={()=>!disabled&&ref.current?.click()}
      style={{border:`2px dashed ${drag?'#E54B2A':'#333'}`,borderRadius:12,padding:'44px 20px',textAlign:'center',cursor:disabled?'default':'pointer',background:drag?'rgba(229,75,42,.05)':'var(--s1)',transition:'all .2s',userSelect:'none'}}
    >
      <input ref={ref} type="file" accept=".csv,.xlsx,.xls" style={{display:'none'}} onChange={e=>{if(e.target.files[0])validate(e.target.files[0])}}/>
      <div style={{color:drag?'#E54B2A':'#444',marginBottom:12}}><I.Upload/></div>
      <p style={{fontSize:15,fontWeight:500,marginBottom:6}}>{drag?'Drop file here':'Drag & drop your file here'}</p>
      <p style={{fontSize:13,color:'var(--mu)',marginBottom:18}}>or click to browse</p>
      <div style={{display:'flex',gap:8,justifyContent:'center',flexWrap:'wrap'}}>
        {['.csv','.xlsx','.xls'].map(t=><span key={t} style={{background:'var(--s2)',border:'1px solid var(--bd)',borderRadius:6,padding:'3px 10px',fontSize:12,color:'var(--mu)',fontWeight:500}}>{t}</span>)}
      </div>
      <p style={{fontSize:12,color:'#444',marginTop:10}}>Max 10 MB</p>
    </div>
  );
}

/* ── FilePreview ──────────────────────────────────────── */
function FilePreview({file,preview,onClear}){
  if(!preview)return null;
  const ext=file.name.split('.').pop().toLowerCase();
  const isXL=ext==='xlsx'||ext==='xls';
  return(
    <div className="card" style={{overflow:'hidden'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px',borderBottom:'1px solid var(--bd)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{background:isXL?'rgba(34,197,94,.1)':'rgba(229,75,42,.1)',borderRadius:8,padding:8,color:isXL?'#4ade80':'#E54B2A'}}><I.File/></div>
          <div>
            <div style={{fontWeight:600,fontSize:14}}>{file.name}</div>
            <div style={{fontSize:12,color:'var(--mu)'}}>{fmtSz(file.size)} · {preview.total||0} rows · {preview.headers?.length||0} columns</div>
          </div>
        </div>
        <button onClick={onClear} className="btn-s" style={{fontSize:12}}><I.Trash/>Remove</button>
      </div>
      <div style={{overflowX:'auto',maxHeight:200}}>
        <table className="tbl" style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
          <thead><tr>{(preview.headers||[]).map((h,i)=><th key={i} style={{padding:'8px 14px',textAlign:'left',color:'var(--mu)',fontWeight:600,fontSize:11,textTransform:'uppercase',letterSpacing:'0.5px',borderBottom:'1px solid var(--bd)',whiteSpace:'nowrap'}}>{h||`Col ${i+1}`}</th>)}</tr></thead>
          <tbody>{(preview.rows||[]).map((row,ri)=><tr key={ri}>{(preview.headers||[]).map((_,ci)=><td key={ci} style={{padding:'8px 14px',borderBottom:'1px solid rgba(46,46,46,.6)',maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:row[ci]?'var(--tx)':'var(--mu)',fontStyle:row[ci]?'normal':'italic'}}>{row[ci]||'—'}</td>)}</tr>)}</tbody>
        </table>
      </div>
      {preview.total>5&&<div style={{padding:'7px 16px',borderTop:'1px solid var(--bd)',fontSize:12,color:'var(--mu)',textAlign:'center'}}>Showing first 5 of {preview.total} rows — all rows will be encrypted</div>}
    </div>
  );
}

/* ── EncryptionPanel ──────────────────────────────────── */
function EncryptionPanel({encKey,onEncrypt,busy,progress}){
  const [copied,setCopied]=useState(false);
  const [showKey,setShowKey]=useState(false);
  const keyOk=encKey.replace(/\s/g,'').length===64;

  async function copy(){await navigator.clipboard.writeText(encKey);setCopied(true);setTimeout(()=>setCopied(false),2000)}

  return(
    <div className="card" style={{padding:20}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
        <div style={{background:'rgba(229,75,42,.1)',borderRadius:8,padding:8,color:'#E54B2A'}}><I.Key/></div>
        <div><div style={{fontWeight:600,fontSize:14}}>Encryption Key</div><div style={{fontSize:12,color:'var(--mu)'}}>AES-256-GCM · 256-bit</div></div>
      </div>

      <div style={{background:'rgba(229,75,42,.06)',border:'1px solid rgba(229,75,42,.2)',borderRadius:8,padding:'10px 14px',marginBottom:16,display:'flex',gap:8,fontSize:12,color:'#ff9b7a',lineHeight:1.5}}>
        <I.Info/><span>AES-256-GCM with a random 96-bit IV. This is your <strong>fixed shared key</strong> — the same key is used for all files. Configure this same key in the XoW Electron app to decrypt.</span>
      </div>

      <label style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6,fontSize:11,fontWeight:600,color:'var(--mu)',textTransform:'uppercase',letterSpacing:'0.6px'}}>
        256-bit Hex Key
        <button onClick={copy} className="btn-s" style={{fontSize:12,color:copied?'#4ade80':'var(--mu)',borderColor:copied?'rgba(34,197,94,.3)':'var(--bd)'}}>{copied?<><I.Check/>Copied!</>:<><I.Copy/>Copy Key</>}</button>
      </label>
      <div style={{position:'relative',marginBottom:10}}>
        <input
          type={showKey?'text':'password'}
          value={encKey}
          readOnly
          className="ki"
          style={{width:'100%',background:'#111',border:'1px solid rgba(34,197,94,.4)',borderRadius:8,padding:'10px 44px 10px 14px',color:'#eee',fontSize:12,outline:'none',cursor:'default'}}
        />
        <button type="button" onClick={()=>setShowKey(v=>!v)} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'var(--mu)',cursor:'pointer',padding:4}}><I.Eye off={!showKey}/></button>
      </div>
      {keyOk&&<p style={{fontSize:12,color:'#4ade80',marginBottom:12,display:'flex',alignItems:'center',gap:4}}><I.Check/>Valid 256-bit key</p>}
      {!keyOk&&encKey.length>0&&<p style={{fontSize:12,color:'#E54B2A',marginBottom:12}}>Key must be exactly 64 hex characters ({encKey.replace(/\s/g,'').length}/64)</p>}

      {!busy?(
        <button onClick={onEncrypt} disabled={!keyOk} className="btn-p" style={{width:'100%',marginTop:4,background:keyOk?'#E54B2A':'#2a2a2a',color:keyOk?'#fff':'#555',cursor:keyOk?'pointer':'not-allowed'}}>
          <I.Lock/>Encrypt File
        </button>
      ):(
        <div style={{marginTop:4}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:13,fontWeight:500,marginBottom:8}}>
            <span style={{display:'flex',alignItems:'center',gap:7}}><svg className="spin" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#E54B2A" strokeWidth="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>Encrypting...</span>
            <span style={{color:'var(--mu)'}}>{Math.round(progress)}%</span>
          </div>
          <div style={{height:6,background:'#1a1a1a',borderRadius:3,overflow:'hidden'}}>
            <div style={{height:'100%',background:'linear-gradient(90deg,#E54B2A,#ff7a55)',borderRadius:3,width:`${progress}%`,transition:'width .12s ease'}}/>
          </div>
          <p style={{fontSize:12,color:'var(--mu)',marginTop:8,textAlign:'center'}}>Do not close this tab</p>
        </div>
      )}
    </div>
  );
}

/* ── DownloadPanel ────────────────────────────────────── */
function DownloadPanel({fileName,blob,encKey,onReset}){
  const [kc,setKc]=useState(false);
  function dl(){const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download=fileName+'.enc';a.click();URL.revokeObjectURL(u)}
  async function cpKey(){await navigator.clipboard.writeText(encKey);setKc(true);setTimeout(()=>setKc(false),2000)}
  return(
    <div className="card" style={{padding:24,textAlign:'center',borderColor:'rgba(34,197,94,.25)'}}>
      <div style={{width:52,height:52,background:'rgba(34,197,94,.1)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px',color:'#4ade80'}}><I.Check/></div>
      <h3 style={{fontSize:16,fontWeight:700,marginBottom:4}}>Encryption Complete</h3>
      <p style={{fontSize:13,color:'var(--mu)',marginBottom:20}}>Your file was encrypted with AES-256-GCM.</p>

      <div style={{background:'var(--s2)',border:'1px solid var(--bd)',borderRadius:8,padding:'10px 16px',marginBottom:14,display:'flex',alignItems:'center',gap:10,textAlign:'left'}}>
        <I.File/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:600,fontSize:14,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{fileName}.enc</div>
          <div style={{fontSize:12,color:'var(--mu)'}}>Encrypted · {fmtSz(blob.size)}</div>
        </div>
        <button onClick={dl} className="btn-p" style={{flexShrink:0,padding:'8px 16px',fontSize:13}}><I.Download/>Download</button>
      </div>

      <div style={{background:'rgba(229,75,42,.07)',border:'1px solid rgba(229,75,42,.22)',borderRadius:8,padding:'12px 16px',marginBottom:16,textAlign:'left'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
          <span style={{fontSize:11,fontWeight:700,color:'#E54B2A',textTransform:'uppercase',letterSpacing:'0.6px',display:'flex',alignItems:'center',gap:5}}><I.Key/>Decryption Key — Save This!</span>
          <button onClick={cpKey} className="btn-s" style={{fontSize:11,color:kc?'#4ade80':'#E54B2A',borderColor:kc?'rgba(34,197,94,.3)':'rgba(229,75,42,.3)',padding:'3px 8px'}}>{kc?<><I.Check/>Copied!</>:<><I.Copy/>Copy Key</>}</button>
        </div>
        <div className="ki" style={{fontSize:11,color:'#bbb',wordBreak:'break-all',lineHeight:1.7,userSelect:'all'}}>{encKey}</div>
      </div>

      <p style={{fontSize:12,color:'var(--mu)',marginBottom:20}}>This is your fixed shared key. Configure it once in the XoW Electron app — it works for all encrypted files.</p>
      <button onClick={onReset} className="btn-s" style={{margin:'0 auto',padding:'9px 20px'}}>Encrypt Another File</button>
    </div>
  );
}

/* ── StepLabel ────────────────────────────────────────── */
function Step({n,label,done}){
  return(
    <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
      <div style={{width:24,height:24,borderRadius:'50%',background:done?'rgba(34,197,94,.12)':'rgba(229,75,42,.12)',border:`1px solid ${done?'rgba(34,197,94,.4)':'rgba(229,75,42,.4)'}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:done?'#4ade80':'#E54B2A',flexShrink:0}}>
        {done?<I.Check/>:n}
      </div>
      <span style={{fontSize:14,fontWeight:600}}>{label}</span>
    </div>
  );
}

/* ── MainApp ──────────────────────────────────────────── */
function MainApp({onLogout}){
  const [file,setFile]=useState(null);
  const [preview,setPreview]=useState(null);
  const [buf,setBuf]=useState(null);
  const [encKey,setEncKey]=useState(FIXED_KEY);
  const [busy,setBusy]=useState(false);
  const [prog,setProg]=useState(0);
  const [blob,setBlob]=useState(null);
  const [err,setErr]=useState('');

  async function onFile(f){
    setErr('');setBlob(null);setFile(f);
    try{
      const b=await readBuf(f);setBuf(b);
      const ext=f.name.split('.').pop().toLowerCase();
      setPreview(ext==='csv'?parseCSV(b):parseXLS(b));
    }catch(e){setErr('Failed to read file: '+e.message);setFile(null);}
  }

  function clear(){setFile(null);setPreview(null);setBuf(null);setBlob(null);setErr('');}

  async function encrypt(){
    if(!buf||!encKey)return;
    setBusy(true);setErr('');setProg(0);
    const t=setInterval(()=>setProg(p=>Math.min(p+Math.random()*18,88)),90);
    try{
      const out=await encryptBuf(buf,encKey);
      clearInterval(t);setProg(100);
      await new Promise(r=>setTimeout(r,350));
      setBlob(new Blob([out],{type:'application/octet-stream'}));
    }catch(e){clearInterval(t);setErr('Encryption failed: '+e.message);}
    finally{setBusy(false);}
  }

  function reset(){clear();}
  function logout(){sessionStorage.removeItem('xow_enc');onLogout();}

  return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',background:'var(--bg)'}}>
      {/* Nav */}
      <header style={{background:'var(--s1)',borderBottom:'1px solid var(--bd)',padding:'0 24px',height:56,display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
        <Logo h={26}/>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <span style={{fontSize:13,color:'var(--mu)'}}>Data Encryptor</span>
          <div style={{width:1,height:20,background:'var(--bd)'}}/>
          <div style={{display:'flex',alignItems:'center',gap:5,background:'rgba(229,75,42,.1)',border:'1px solid rgba(229,75,42,.3)',borderRadius:20,padding:'3px 10px',fontSize:10,fontWeight:700,letterSpacing:'1px',color:'#ff6b4a'}}>
            <svg width="7" height="7" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/></svg>CLIENT-SIDE
          </div>
          <button onClick={logout} className="btn-s" style={{fontSize:12}}><I.Logout/>Sign Out</button>
        </div>
      </header>

      {/* Content */}
      <main style={{flex:1,display:'flex',justifyContent:'center',padding:'32px 20px',overflowY:'auto'}}>
        <div style={{width:'100%',maxWidth:740}}>
          <div style={{marginBottom:24}}>
            <h1 style={{fontSize:22,fontWeight:700,marginBottom:6}}>Encrypt Visitor Data</h1>
            <p style={{fontSize:14,color:'var(--mu)'}}>Upload a CSV or Excel file to encrypt it with AES-256-GCM before transferring to your SD card or USB drive.</p>
          </div>

          {err&&(
            <div style={{background:'rgba(229,75,42,.1)',border:'1px solid rgba(229,75,42,.3)',borderRadius:10,padding:'11px 16px',marginBottom:16,display:'flex',alignItems:'center',gap:10,fontSize:13,color:'#ff6b4a'}}>
              <I.X/>{err}
              <button onClick={()=>setErr('')} style={{marginLeft:'auto',background:'none',border:'none',color:'#ff6b4a',cursor:'pointer',padding:2}}><I.X/></button>
            </div>
          )}

          {!blob?(
            <div style={{display:'flex',flexDirection:'column',gap:20}}>
              <div>
                <Step n={1} label="Upload File" done={!!file}/>
                {!file?<DropZone onFile={onFile} disabled={busy}/>:<FilePreview file={file} preview={preview} onClear={clear}/>}
              </div>
              {file&&(
                <div className="fu">
                  <Step n={2} label="Configure & Encrypt" done={false}/>
                  <EncryptionPanel encKey={encKey} onEncrypt={encrypt} busy={busy} progress={prog}/>
                </div>
              )}
            </div>
          ):(
            <div className="fu">
              <Step n={3} label="Download Encrypted File" done={true}/>
              <DownloadPanel fileName={file.name} blob={blob} encKey={encKey} onReset={reset}/>
            </div>
          )}

          {/* Info pills */}
          <div style={{marginTop:28,display:'flex',gap:10,flexWrap:'wrap'}}>
            {[
              [<I.Shield/>,'Client-side only — no data leaves your browser'],
              [<I.Lock/>,'AES-256-GCM authenticated encryption'],
              [<I.File/>,'Output: filename.csv.enc'],
            ].map(([icon,txt],i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:6,background:'var(--s1)',border:'1px solid var(--bd)',borderRadius:20,padding:'5px 12px',fontSize:12,color:'var(--mu)'}}>{icon}{txt}</div>
            ))}
          </div>
        </div>
      </main>
    </div>
  );
}

/* ── Root ─────────────────────────────────────────────── */
function App(){
  const [auth,setAuth]=useState(()=>sessionStorage.getItem('xow_enc')==='1');
  if(!auth)return<LoginPage onLogin={()=>setAuth(true)}/>;
  return<MainApp onLogout={()=>setAuth(false)}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
