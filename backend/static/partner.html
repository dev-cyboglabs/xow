<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Become a Partner - XoW</title>
    <link rel="icon" type="image/svg+xml" href="/assets/xow-logo.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #ffffff;
            min-height: 100vh;
        }
        @media (min-width: 768px) {
            body {
                height: 100vh;
                overflow: hidden;
            }
        }
        .gradient-text {
            background: linear-gradient(135deg, #E54B2A 0%, #FF6B4A 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .btn-primary {
            background: linear-gradient(135deg, #E54B2A 0%, #FF6B4A 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(229, 75, 42, 0.3);
        }
        .input-field {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            background: #ffffff;
            border-color: #E54B2A;
            outline: none;
            box-shadow: 0 0 0 3px rgba(229, 75, 42, 0.1);
        }
        .success-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .success-modal.show {
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        .success-content {
            animation: slideIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="font-sans">
    <!-- Header -->
    <header class="border-b border-gray-200 bg-white">
        <div class="max-w-7xl mx-auto px-4 md:px-6 py-2.5 md:py-3">
            <div class="flex items-center justify-between">
                <img src="/assets/xow-logo.svg" alt="XoW Logo" class="h-8 md:h-8">
                <a href="/api/home" class="text-gray-700 hover:text-[#E54B2A] transition-colors font-medium text-sm md:text-base">
                    Back
                </a>
            </div>
        </div>
    </header>

    <!-- Success Modal Popup -->
    <div id="successModal" class="success-modal">
        <div class="success-content bg-white rounded-2xl p-6 md:p-8 max-w-md mx-4 shadow-2xl">
            <div class="text-center">
                <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                </div>
                <h3 class="text-xl md:text-2xl font-bold text-gray-900 mb-2 md:mb-3">Thank You!</h3>
                <p class="text-sm md:text-base text-gray-600 mb-4 md:mb-6">We've received your partnership request. Our team will contact you within 24-48 hours.</p>
                <button onclick="closeSuccessModal()" class="btn-primary px-6 md:px-8 py-2.5 md:py-3 text-white rounded-lg font-semibold w-full text-sm md:text-base">
                    Close
                </button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="min-h-[calc(100vh-65px)] md:h-[calc(100vh-73px)] flex items-center justify-center px-4 md:px-6 py-6 md:py-0">
        <div class="w-full max-w-3xl">
            <!-- Contact Form -->
            <div id="formContainer" class="bg-white border border-gray-200 rounded-xl p-6 md:p-10 shadow-sm">
                <div class="text-center mb-4 md:mb-6">
                    <h1 class="text-2xl md:text-3xl font-bold text-gray-900 mb-2">
                        Become a <span class="gradient-text">XoW Partner</span>
                    </h1>
                    <p class="text-gray-600 text-xs md:text-sm">Join our growing network and help businesses transform expo conversations</p>
                </div>
            <form id="partnerForm">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-5 mb-4 md:mb-5">
                    <!-- Name -->
                    <div>
                        <label for="name" class="block text-sm font-medium text-gray-700 mb-1.5">
                            Full Name <span class="text-[#E54B2A]">*</span>
                        </label>
                        <input 
                            type="text" 
                            id="name" 
                            name="name" 
                            required
                            class="input-field w-full px-3.5 py-2.5 rounded-lg text-gray-900 placeholder-gray-400 text-sm"
                            placeholder="John Doe"
                        >
                    </div>

                    <!-- Email -->
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-1.5">
                            Email Address <span class="text-[#E54B2A]">*</span>
                        </label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            required
                            class="input-field w-full px-3.5 py-2.5 rounded-lg text-gray-900 placeholder-gray-400 text-sm"
                            placeholder="john@example.com"
                        >
                    </div>

                    <!-- Phone -->
                    <div>
                        <label for="phone" class="block text-sm font-medium text-gray-700 mb-1.5">
                            Phone Number <span class="text-[#E54B2A]">*</span>
                        </label>
                        <input 
                            type="tel" 
                            id="phone" 
                            name="phone" 
                            required
                            class="input-field w-full px-3.5 py-2.5 rounded-lg text-gray-900 placeholder-gray-400 text-sm"
                            placeholder="+1 (555) 123-4567"
                        >
                    </div>

                    <!-- Company/Organization -->
                    <div>
                        <label for="company" class="block text-sm font-medium text-gray-700 mb-1.5">
                            Company / Organization <span class="text-[#E54B2A]">*</span>
                        </label>
                        <input 
                            type="text" 
                            id="company" 
                            name="company" 
                            required
                            class="input-field w-full px-3.5 py-2.5 rounded-lg text-gray-900 placeholder-gray-400 text-sm"
                            placeholder="Acme Corporation"
                        >
                    </div>

                    <!-- Interest/Use Case -->
                    <div class="md:col-span-2">
                        <label for="interest" class="block text-sm font-medium text-gray-700 mb-1.5">
                            How do you plan to use XoW? <span class="text-[#E54B2A]">*</span>
                        </label>
                        <select 
                            id="interest" 
                            name="interest" 
                            required
                            class="input-field w-full px-3.5 py-2.5 rounded-lg text-gray-900 text-sm"
                        >
                            <option value="" disabled selected>Select an option</option>
                            <option value="reseller">Reseller / Distributor</option>
                            <option value="integration">Technology Integration</option>
                            <option value="expo">Expo / Event Management</option>
                            <option value="enterprise">Enterprise Deployment</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <!-- Message -->
                    <div class="md:col-span-2">
                        <label for="message" class="block text-sm font-medium text-gray-700 mb-1.5">
                            Additional Information
                        </label>
                        <textarea 
                            id="message" 
                            name="message" 
                            rows="2"
                            class="input-field w-full px-3.5 py-2.5 rounded-lg text-gray-900 placeholder-gray-400 resize-none text-sm"
                            placeholder="Tell us more about your partnership goals..."
                        ></textarea>
                    </div>
                </div>

                <!-- Submit Button -->
                <button 
                    type="submit" 
                    class="btn-primary w-full px-6 py-2.5 md:py-3 text-white rounded-lg font-semibold mb-3 text-sm md:text-base"
                >
                    Submit Partnership Request
                </button>

                <!-- Privacy Note -->
                <p class="text-xs text-gray-500 text-center">
                    By submitting this form, you agree to our 
                    <a href="#" class="text-[#E54B2A] hover:underline">Privacy Policy</a> and 
                    <a href="#" class="text-[#E54B2A] hover:underline">Terms of Service</a>
                </p>
            </form>
        </div>
    </main>

    <script>
        document.getElementById('partnerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Show success modal popup
            document.getElementById('successModal').classList.add('show');
            
            // Optional: Log form data to console
            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());
            console.log('Partner form submitted:', data);
            
            // Reset form
            this.reset();
        });

        function closeSuccessModal() {
            document.getElementById('successModal').classList.remove('show');
        }

        // Close modal when clicking outside
        document.getElementById('successModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeSuccessModal();
            }
        });
    </script>
</body>
</html>
